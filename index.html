<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PerfectBoard Stock Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #2c3e50; }
    input { padding: 8px; margin-top: 10px; width: 300px; }
    button { margin-left: 10px; padding: 8px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f4f4f4; cursor: pointer; }
    tr.positive td { background-color: #eafbea; }
    tr.negative td { background-color: #fdeaea; }
    @media (max-width: 600px) {
      table, th, td { font-size: 12px; }
      input { width: 100%; }
    }
    canvas { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>PerfectBoard Stock Tracker</h1>
  <input type="text" id="search" placeholder="Search stock name...">
  <button onclick="exportCSV()">Export CSV</button>
  <div id="stock-table">Loading data...</div>
  <canvas id="stockChart" width="400" height="200"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    let stockData = [];
    let sortDirection = { StockName: 1, Price: 1, Change: 1 };

    async function loadData() {
      try {
        const response = await fetch("https://script.google.com/macros/s/AKfycbzx-u-itLfjM9s7lELfwmKMnp0tOc89GDIy6-do5S9InG-OXwDZvRoDRzIB3OfNewMQNg/exec");
        stockData = await response.json();
        renderTable(stockData);
        renderChart(stockData);
      } catch (error) {
        document.getElementById("stock-table").innerHTML = "Error loading data.";
        console.error("Fetch error:", error);
      }
    }

    function renderTable(data) {
      let html = "<table><tr><th onclick=\"sortTable('StockName')\">Stock Name</th><th onclick=\"sortTable('Price')\">Price</th><th onclick=\"sortTable('Change')\">Change</th></tr>";
      data.forEach(item => {
        const rowClass = parseFloat(item.Change) >= 0 ? "positive" : "negative";
        html += `<tr class="${rowClass}"><td>${item.StockName}</td><td>${item.Price}</td><td>${item.Change}</td></tr>`;
      });
      html += "</table>";
      document.getElementById("stock-table").innerHTML = html;
    }

    function sortTable(column) {
      stockData.sort((a, b) => {
        if (column === "Price" || column === "Change") {
          return sortDirection[column] * (parseFloat(a[column]) - parseFloat(b[column]));
        } else {
          return sortDirection[column] * a[column].localeCompare(b[column]);
        }
      });
      sortDirection[column] *= -1;
      renderTable(stockData);
    }

    document.getElementById("search").addEventListener("input", function() {
      const query = this.value.toLowerCase();
      const filtered = stockData.filter(item => item.StockName.toLowerCase().includes(query));
      renderTable(filtered);
      renderChart(filtered);
    });

    function exportCSV() {
      let csv = "Stock Name,Price,Change\n";
      stockData.forEach(item => {
        csv += `${item.StockName},${item.Price},${item.Change}\n`;
      });
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "stock_data.csv";
      a.click();
    }

    function renderChart(data) {
      const ctx = document.getElementById("stockChart").getContext("2d");
      new Chart(ctx, {
        type: "bar",
        data: {
          labels: data.map(item => item.StockName),
          datasets: [{
            label: "Price",
            data: data.map(item => parseFloat(item.Price)),
            backgroundColor: "rgba(54, 162, 235, 0.6)"
          }]
        }
      });
    }

    // Auto-refresh every 5 minutes
    setInterval(loadData, 300000);

    window.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>

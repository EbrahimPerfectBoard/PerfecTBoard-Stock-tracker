<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PerfectBoard Stock Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #2c3e50; }
    input { padding: 8px; margin-top: 10px; width: 300px; }
    button { margin-left: 10px; padding: 8px; }
    .table-container { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; min-width: 1200px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f4f4f4; cursor: pointer; }
    .low-stock { background-color: #f8d7da; }   /* red */
    .at-stock { background-color: #fff3cd; }   /* yellow */
    .good-stock { background-color: #d4edda; } /* green */
    canvas { margin-top: 30px; }
  </style>
</head>
<body>
  <h1>PerfectBoard Stock Tracker</h1>
  <input type="text" id="search" placeholder="Search ID or Description...">
  <button onclick="exportCSV()">Export CSV</button>
  <div class="table-container" id="stock-table">Loading data...</div>
  <h2>Total Reels per Description</h2>
  <canvas id="reelChart" width="400" height="200"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    let stockData = [];
    let sortDirection = {};

    async function loadData() {
      try {
        const response = await fetch("https://script.google.com/macros/s/AKfycbxwR2ZUgtwsC6bO4O_8LMdOeKhfPPax98LgN82G-JXYI99L_th-8wWUNixrwoTn9W1mVg/exec");
        stockData = await response.json();
        renderTable(stockData);
        renderChart(stockData);
      } catch (error) {
        document.getElementById("stock-table").innerHTML = "Error loading data.";
        console.error(error);
      }
    }

    function renderTable(data) {
      let html = "<table><tr>";
      const headers = ["ID","Description","Flute","GSM","Width","QtyReels","WeightPerReel","MinStock","LastUpdated"];
      headers.forEach(h => html += `<th onclick="sortTable('${h}')">${h}</th>`);
      html += "</tr>";

      data.forEach(item => {
        const qty = parseFloat(item.QtyReels) || 0;
        const min = parseFloat(item.MinStock) || 0;
        let rowClass = "";
        if (qty < min) rowClass = "low-stock";
        else if (qty === min) rowClass = "at-stock";
        else if (qty > min) rowClass = "good-stock";

        html += `<tr class="${rowClass}">
          <td>${item.ID}</td>
          <td>${item.Description}</td>
          <td>${item.Flute}</td>
          <td>${item.GSM}</td>
          <td>${item.Width}</td>
          <td>${item.QtyReels}</td>
          <td>${item.WeightPerReel}</td>
          <td>${item.MinStock}</td>
          <td>${item.LastUpdated}</td>
        </tr>`;
      });
      html += "</table>";
      document.getElementById("stock-table").innerHTML = html;
    }

    function sortTable(column) {
      stockData.sort((a, b) => {
        const dir = sortDirection[column] || 1;
        sortDirection[column] = -dir;
        return dir * a[column].toString().localeCompare(b[column].toString());
      });
      renderTable(stockData);
    }

    document.getElementById("search").addEventListener("input", function() {
      const q = this.value.toLowerCase();
      const filtered = stockData.filter(item =>
        item.ID.toLowerCase().includes(q) ||
        item.Description.toLowerCase().includes(q)
      );
      renderTable(filtered);
      renderChart(filtered);
    });

    function exportCSV() {
      let csv = "ID,Description,Flute,GSM,Width,QtyReels,WeightPerReel,MinStock,LastUpdated\n";
      stockData.forEach(item => {
        csv += `${item.ID},${item.Description},${item.Flute},${item.GSM},${item.Width},${item.QtyReels},${item.WeightPerReel},${item.MinStock},${item.LastUpdated}\n`;
      });
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "PerfectBoard_Stock.csv";
      a.click();
    }

    function renderChart(data) {
      const ctx = document.getElementById("reelChart").getContext("2d");
      const totals = {};
      data.forEach(item => {
        const desc = item.Description || "Unknown";
        const qty = parseFloat(item.QtyReels) || 0;
        totals[desc] = (totals[desc] || 0) + qty;
      });

      new Chart(ctx, {
        type: "bar",
        data: {
          labels: Object.keys(totals),
          datasets: [{
            label: "Total Reels",
            data: Object.values(totals),
            backgroundColor: "rgba(54, 162, 235, 0.6)"
          }]
        },
        options: {
          scales: { y: { beginAtZero: true } }
        }
      });
    }

    setInterval(loadData, 300000);
    window.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
